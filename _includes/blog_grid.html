<section class="section" id="blog">
  <div class="container">
    <h2 class="section-heading">Blog</h2>
    {% if site.posts.size > 0 %}
    <div class="blog-grid">
      {% for post in site.posts limit:6 %}
      <a href="{{ post.url | prepend: site.baseurl }}" class="blog-card">
        <article>
          <time class="blog-card-date" datetime="{{ post.date | date_to_xmlschema }}">
            {{ post.date | date: "%B %-d, %Y" }}
          </time>
          <h3 class="blog-card-title">{{ post.title }}</h3>
          <p class="blog-card-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
        </article>
      </a>
      {% endfor %}
    </div>
    {% else %}
    <p class="blog-empty">Posts coming soon.</p>
    {% endif %}
  </div>
</section>
