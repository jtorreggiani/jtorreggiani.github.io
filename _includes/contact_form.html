<section class="section section--alt" id="contact">
  <div class="container container--narrow">
    <h2 class="section-heading">Contact Me</h2>
    <form action="//formspree.io/{{ site.email }}" method="POST" id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" required placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="_replyto" id="email" required placeholder="you@example.com">
      </div>
      <input type="hidden" name="_subject" value="New submission!">
      <input type="text" name="_gotcha" style="display:none">
      <div class="form-group">
        <label for="message">Message</label>
        <textarea name="message" id="message" rows="5" required placeholder="Your message"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
  </div>
</section>
